<form class="inbox-compose form-horizontal" id="fileupload" action="#" method="POST" enctype="multipart/form-data">
    <div class="inbox-form-group mail-to">
        <label class="control-label">An:</label>
        <div class="controls controls-to">
            <select id="multiple" class="form-control select2-multiple" multiple>
                <optgroup label="Standorte">
                    <option value="1">Essen</option>
                    <option value="2">Düsseldorf</option>
                    <option value="3">Köln</option>
                </optgroup>
            </select>
        </div>
    </div>
    <div class="inbox-form-group">
        <label class="control-label">Betreff:</label>
        <div class="controls">
            <input type="text" class="form-control" name="subject"> 
        </div>
    </div>
    <div class="inbox-form-group">
        <textarea class="inbox-editor inbox-wysihtml5 form-control" name="message" rows="12"></textarea>
    </div>
    <div class="inbox-compose-attachment">
        <!-- The fileupload-buttonbar contains buttons to add/delete files and start/cancel the upload -->
        <span class="btn blue btn-outline fileinput-button"><i class="fa fa-plus"></i><span> Datei(en) hinzufügen.. </span><input type="file" name="files[]" multiple> </span>
        <!-- The table listing the files available for upload/download -->
        <table role="presentation" class="table table-striped margin-top-10">
            <tbody class="files"> </tbody>
        </table>
    </div>
    <div class="inbox-form-group"> 
        <div class="col-md-6">              
</div>
        <table class="table table-light table-hover"> 
            <tr> 
                <td> Versenden am </td> 
                <td> 
                    <div class="input-group input-medium date form_datetime" data-date-start-date="+0d">
                        <input type="text" size="5" readonly class="form-control">
                        <span class="input-group-btn"><button class="btn default date-set" type="button">
                                <i class="fa fa-calendar"></i>
                            </button></span>
                    </div>
                </td>                 
            </tr>             
            <tr> 
                <td> Auf Website veröffentlichen </td> 
                <td> 
                    <label class="uniform-inline"> 
                        <input type="checkbox" value="" /> Ja 
                    </label>                     
                </td>                 
            </tr>             
            <tr> 
                <td> Auf Facebook veröffentlichen </td> 
                <td> 
                    <label class="uniform-inline"> 
                        <input type="checkbox" value="" /> Ja 
                    </label>                     
                </td>                 
            </tr>             
        </table>         
        <!--end profile-settings-->         
    </div>
    <script id="template-upload" type="text/x-tmpl"> {% for (var i=0, file; file=o.files[i]; i++) { %}
        <tr class="template-upload fade">
            <td class="name" width="30%">
                <span>{%=file.name%}</span>
            </td>
            <td class="size" width="40%">
                <span>{%=o.formatFileSize(file.size)%}</span>
            </td> {% if (file.error) { %}
            <td class="error" width="20%" colspan="2">
                <span class="label label-danger">Error</span> {%=file.error%}</td> {% } else if (o.files.valid && !i) { %}
            <td>
                <p class="size">{%=o.formatFileSize(file.size)%}</p>
                <div class="progress progress-striped active" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    <div class="progress-bar progress-bar-success" style="width:0%;"></div>
                </div>
            </td> {% } else { %}
            <td colspan="2"></td> {% } %}
            <td class="cancel" width="10%" align="right">{% if (!i) { %}
                <button class="btn btn-sm red cancel">
                    <i class="fa fa-ban"></i>
                    <span>Cancel</span>
                </button> {% } %}</td>
        </tr> {% } %} </script>
    <!-- The template to display files available for download -->
    <script id="template-download" type="text/x-tmpl"> {% for (var i=0, file; file=o.files[i]; i++) { %}
        <tr class="template-download fade"> {% if (file.error) { %}
            <td class="name" width="30%">
                <span>{%=file.name%}</span>
            </td>
            <td class="size" width="40%">
                <span>{%=o.formatFileSize(file.size)%}</span>
            </td>
            <td class="error" width="30%" colspan="2">
                <span class="label label-danger">Error</span> {%=file.error%}</td> {% } else { %}
            <td class="name" width="30%">
                <a href="{%=file.url%}" title="{%=file.name%}" data-gallery="{%=file.thumbnail_url&&'gallery'%}" download="{%=file.name%}">{%=file.name%}</a>
            </td>
            <td class="size" width="40%">
                <span>{%=o.formatFileSize(file.size)%}</span>
            </td>
            <td colspan="2"></td> {% } %}
            <td class="delete" width="10%" align="right">
                <button class="btn default btn-sm" data-type="{%=file.delete_type%}" data-url="{%=file.delete_url%}" {% if (file.delete_with_credentials) { %} data-xhr-fields='{"withCredentials":true}' {% } %}>
                    <i class="fa fa-times"></i>
                </button>
            </td>
        </tr> {% } %} </script>
    <div class="inbox-compose-btn">
        <button class="btn blue">
            Senden
        </button>
    </div>
</form>
<script src="../assets/global/plugins/moment.min.js" type="text/javascript"></script>
<script src="../assets/global/plugins/bootstrap-daterangepicker/daterangepicker.min.js" type="text/javascript"></script>
<script src="../assets/global/plugins/bootstrap-datepicker/js/bootstrap-datepicker.min.js" type="text/javascript"></script>
<script src="../assets/global/plugins/bootstrap-timepicker/js/bootstrap-timepicker.min.js" type="text/javascript"></script>
<script src="../assets/global/plugins/bootstrap-datetimepicker/js/bootstrap-datetimepicker.min.js" type="text/javascript"></script>
<script src="../assets/global/plugins/clockface/js/clockface.js" type="text/javascript"></script>
<script src="../assets/global/plugins/bootstrap-datepicker/js/bootstrap-datepicker.min.js" type="text/javascript"></script> 
<script src="../assets/global/plugins/bootstrap-datepicker/locales/bootstrap-datepicker.de.min.js" type="text/javascript"></script>
<script src="../assets/pages/scripts/components-date-time-pickers.js" type="text/javascript"></script>

<script src="../assets/global/plugins/select2/js/select2.full.min.js" type="text/javascript"></script>
<script src="../assets/pages/scripts/components-select2.js" type="text/javascript"></script>
